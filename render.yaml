services:
  - type: web
    name: ai-os-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    plan: free
    envVars:
      - key: APP_ENV
        value: production
      - key: DEBUG
        value: false
      - key: APP_HOST
        value: 0.0.0.0
      - key: LOCAL_MODE
        value: false
      - key: JWT_ALGORITHM
        value: HS256
      - key: JWT_EXPIRY_MINUTES
        value: 1440
      - key: FREE_TIER_DAILY_LIMIT
        value: 50
      - key: FREE_TIER_RPM
        value: 5
      - key: PRO_TIER_RPM
        value: 60
      - key: ENTERPRISE_TIER_RPM
        value: 120
      # ⚠️ Set these secrets manually in Render Dashboard → Environment:
      # JWT_SECRET, SUPABASE_URL, SUPABASE_ANON_KEY, GROQ_API_KEY, REDIS_URL
